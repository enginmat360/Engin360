<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGİN360 Ders Doktoru</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top,#5b21ff 0,#160032 38%,#050510 100%);
  color:white;
  padding:16px;
}
.app{
  max-width:560px;
  margin:auto;
  background:rgba(255,255,255,.085);
  border:1px solid rgba(255,255,255,.17);
  border-radius:28px;
  padding:20px;
  box-shadow:0 0 38px rgba(107,55,255,.42);
}
.logo{text-align:center;font-size:32px;font-weight:900;letter-spacing:1px}
.logo span{color:#00eaff}
.sub{text-align:center;color:#ded8ff;font-size:13px;line-height:1.4;margin:6px 0 18px}
.card{
  background:rgba(0,0,0,.27);
  border:1px solid rgba(255,255,255,.11);
  border-radius:21px;
  padding:15px;
  margin-bottom:14px;
}
h3{margin:0 0 10px;font-size:16px}
label{display:block;margin:9px 0 5px;font-size:13px;color:#eeeaff;font-weight:bold}
input,select{
  width:100%;
  padding:12px;
  border:0;
  outline:0;
  border-radius:13px;
  font-size:16px;
  background:#fff;
  color:#111;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{
  width:100%;
  border:0;
  border-radius:18px;
  padding:15px;
  margin-top:8px;
  background:linear-gradient(90deg,#8a2cff,#00cfff);
  color:white;
  font-size:17px;
  font-weight:900;
  box-shadow:0 0 22px rgba(0,207,255,.27);
}
.result{
  display:none;
  margin-top:15px;
  padding:16px;
  border-radius:23px;
  background:linear-gradient(160deg,rgba(0,234,255,.16),rgba(138,44,255,.22));
  border:1px solid rgba(255,255,255,.22);
}
.big{text-align:center;font-size:28px;font-weight:900;color:#7df9ff;margin:7px 0 13px}
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid rgba(255,255,255,.13);
  padding:8px 0;
  font-size:14px;
}
.row:last-child{border-bottom:0}
.analysis{
  margin-top:12px;
  background:rgba(0,0,0,.22);
  border-radius:16px;
  padding:12px;
  font-size:13px;
  line-height:1.55;
}
.badge{
  display:inline-block;
  background:rgba(255,255,255,.14);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin:4px 3px;
}
.footer{
  margin-top:14px;
  text-align:center;
  font-size:12px;
  color:#cfc8ff;
  letter-spacing:.2px;
}
</style>
</head>
<body>
<div class="app">
  <div class="logo">ENGİN<span>360</span></div>
  <div class="sub">Ders Doktoru<br>Dersi, net seviyesini ve problemi seç; kısa çalışma reçeteni al.</div>

  <div class="card">
    <h3>Öğrenci Durumu</h3>

    <label>Ders</label>
    <select id="ders">
      <option value="matematik">Matematik</option>
      <option value="geometri">Geometri</option>
      <option value="fizik">Fizik</option>
      <option value="kimya">Kimya</option>
      <option value="biyoloji">Biyoloji</option>
      <option value="turkce">Türkçe</option>
      <option value="edebiyat">Edebiyat</option>
      <option value="sosyal">Sosyal</option>
    </select>

    <div class="grid">
      <div>
        <label>Net Seviyesi</label>
        <select id="seviye">
          <option value="dusuk">Düşük</option>
          <option value="orta" selected>Orta</option>
          <option value="iyi">İyi</option>
        </select>
      </div>
      <div>
        <label>Günlük Süre</label>
        <select id="sure">
          <option value="45">45 dk</option>
          <option value="60" selected>60 dk</option>
          <option value="90">90 dk</option>
          <option value="120">120 dk</option>
        </select>
      </div>
    </div>

    <label>En Büyük Problem</label>
    <select id="problem">
      <option value="konu">Konu eksiğim var</option>
      <option value="soru">Soru tarzını çözemiyorum</option>
      <option value="sure">Süre yetmiyor</option>
      <option value="dikkat">Dikkat hatası yapıyorum</option>
      <option value="unutma">Çalışıyorum ama unutuyorum</option>
      <option value="motivasyon">Başlamakta zorlanıyorum</option>
    </select>

    <div>
      <span class="badge">Kısa reçete</span>
      <span class="badge">Net odaklı</span>
      <span class="badge">Uygulama için uygun</span>
    </div>
  </div>

  <button onclick="reçeteYaz()">Ders Reçetesi Oluştur</button>

  <div class="result" id="sonuc">
    <div style="text-align:center">Ders Reçeten</div>
    <div class="big" id="baslik">-</div>

    <div class="row"><span>Çalışma Modeli</span><b id="model">-</b></div>
    <div class="row"><span>İlk Odak</span><b id="odak">-</b></div>
    <div class="row"><span>Soru Hedefi</span><b id="soruHedef">-</b></div>
    <div class="row"><span>Kontrol Kuralı</span><b id="kontrol">-</b></div>

    <div class="analysis" id="strateji"></div>
    <div class="analysis" id="plan"></div>
    <div class="footer">ENGİN360 Öğrenci Koçluk Sistemi tarafından oluşturulmuştur.</div>
  </div>
</div>

<script>
const dersVeri = {
  matematik:{
    ad:"Matematik",
    odak:"Konu + soru tipi",
    soru:"30-60 soru",
    kontrol:"Yanlış defteri",
    temel:"Matematikte net artışı için konu öğrenmek tek başına yetmez. Aynı konudan kolay, orta ve karma soru birlikte çözülmeli."
  },
  geometri:{
    ad:"Geometri",
    odak:"Şekil okuma",
    soru:"20-40 soru",
    kontrol:"Çizim kontrolü",
    temel:"Geometride ilk amaç şekli doğru okumaktır. Her soruda verilenleri şekle temiz yerleştirmek neti doğrudan artırır."
  },
  fizik:{
    ad:"Fizik",
    odak:"Kavram + formül",
    soru:"20-35 soru",
    kontrol:"Birim ve yön kontrolü",
    temel:"Fizikte formül ezberi tek başına yeterli değildir. Önce olayın mantığı, sonra kısa formül uygulaması yapılmalı."
  },
  kimya:{
    ad:"Kimya",
    odak:"Kavram + işlem",
    soru:"25-40 soru",
    kontrol:"Tepkime ve mol kontrolü",
    temel:"Kimyada konu bilgisi ile işlem iç içedir. Küçük bilgi boşlukları tüm soruyu kaçırabilir."
  },
  biyoloji:{
    ad:"Biyoloji",
    odak:"Tekrar + bağlantı",
    soru:"20-35 soru",
    kontrol:"Kavram eşleştirme",
    temel:"Biyolojide unutmayı azaltmak için kısa ama sık tekrar gerekir. Sadece okumak yerine kavramlar ilişkilendirilmelidir."
  },
  turkce:{
    ad:"Türkçe",
    odak:"Paragraf ritmi",
    soru:"25-45 soru",
    kontrol:"Soru kökü işaretleme",
    temel:"Türkçede süre ve dikkat birlikte yönetilmelidir. Paragrafta soru kökü okunmadan metne dalmak hata artırır."
  },
  edebiyat:{
    ad:"Edebiyat",
    odak:"Dönem + yazar-eser",
    soru:"20-35 soru",
    kontrol:"Mini tekrar kartı",
    temel:"Edebiyatta bilgi tekrar edilmezse hızlı unutulur. Dönem, sanatçı ve eserleri küçük kartlarla bağlamak gerekir."
  },
  sosyal:{
    ad:"Sosyal",
    odak:"Kavram + yorum",
    soru:"20-35 soru",
    kontrol:"Bilgi-yorum ayrımı",
    temel:"Sosyal derslerde soru bazen bilgi, bazen yorum ister. Önce soru ne istiyor onu ayırmak gerekir."
  }
};

function reçeteYaz(){
  const ders=document.getElementById("ders").value;
  const seviye=document.getElementById("seviye").value;
  const problem=document.getElementById("problem").value;
  const sure=Number(document.getElementById("sure").value);
  const d=dersVeri[ders];

  let model="", odak=d.odak, soruHedef=d.soru, kontrol=d.kontrol;
  let strateji="", plan="";

  if(seviye==="dusuk"){
    model="Temel kurma";
    strateji=d.temel+" Şu an amaç zor sorular değil, konunun giriş düzeyini sağlamlaştırmaktır.";
  }else if(seviye==="orta"){
    model="Net artırma";
    strateji=d.temel+" Orta seviyede en büyük kazanç, yanlış çıkan soru tiplerini tekrar yakalamaktır.";
  }else{
    model="Seçici güçlendirme";
    strateji=d.temel+" İyi seviyede konu tekrarı uzun tutulmamalı; deneme, analiz ve seçici soru çözümü öne geçmelidir.";
  }

  if(problem==="konu"){
    odak="Konu eksiği kapatma";
    plan="Plan: "+Math.round(sure*0.40)+" dk konu özeti + "+Math.round(sure*0.45)+" dk temel/orta test + "+Math.round(sure*0.15)+" dk yanlış kontrolü.";
  }
  if(problem==="soru"){
    odak="Soru tipi tanıma";
    plan="Plan: 5 çözümlü örnek incele + benzer 20 soru çöz + çıkan kalıpları küçük not halinde yaz.";
  }
  if(problem==="sure"){
    odak="Süre stratejisi";
    plan="Plan: Süreli mini test yap. Takıldığın soruda inat etme; 90 saniyede yol açılmıyorsa ikinci tura bırak.";
  }
  if(problem==="dikkat"){
    odak="Dikkat kontrolü";
    plan="Plan: Her soruda soru kökünü işaretle. 'Değildir, en az, en çok, kesinlikle' ifadelerini özellikle kontrol et.";
  }
  if(problem==="unutma"){
    odak="Aralıklı tekrar";
    plan="Plan: Bugün 20 dk çalışma, yarın 10 dk tekrar, 3 gün sonra 10 soru mini tekrar. Unutmayı azaltan sistem budur.";
  }
  if(problem==="motivasyon"){
    odak="Küçük başlangıç";
    plan="Plan: 10 dakika konuya bak + 10 soru çöz. Büyük hedef koyma; amaç masaya oturma direncini kırmak.";
  }

  if(sure>=90){
    soruHedef="40-70 soru";
    plan += " Süren yüksek olduğu için çalışmanın sonuna mutlaka kısa yanlış analizi ekle.";
  }else if(sure<=45){
    soruHedef="15-30 soru";
    plan += " Süren kısa olduğu için tek konu ve tek hedef seç; dağılma.";
  }

  document.getElementById("baslik").innerText=d.ad+" Reçetesi";
  document.getElementById("model").innerText=model;
  document.getElementById("odak").innerText=odak;
  document.getElementById("soruHedef").innerText=soruHedef;
  document.getElementById("kontrol").innerText=kontrol;
  document.getElementById("strateji").innerText=strateji;
  document.getElementById("plan").innerText=plan;
  document.getElementById("sonuc").style.display="block";
}
</script>
</body>
</html>
