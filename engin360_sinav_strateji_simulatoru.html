<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGİN360 Sınav Strateji Simülatörü</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#5528ff 0,#170038 38%,#050510 100%);color:white;padding:16px}
.app{max-width:540px;margin:auto;background:rgba(255,255,255,.085);border:1px solid rgba(255,255,255,.17);border-radius:28px;padding:20px;box-shadow:0 0 38px rgba(107,55,255,.42)}
.logo{text-align:center;font-size:32px;font-weight:900;letter-spacing:1px}.logo span{color:#00eaff}
.sub{text-align:center;color:#ded8ff;font-size:13px;line-height:1.4;margin:6px 0 18px}
.card{background:rgba(0,0,0,.27);border:1px solid rgba(255,255,255,.11);border-radius:21px;padding:15px;margin-bottom:14px}
h3{margin:0 0 10px;font-size:16px}
label{display:block;margin:9px 0 5px;font-size:13px;color:#eeeaff;font-weight:bold}
input,select{width:100%;padding:12px;border:0;outline:0;border-radius:13px;font-size:16px;background:#fff;color:#111}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:18px;padding:15px;margin-top:8px;background:linear-gradient(90deg,#8a2cff,#00cfff);color:white;font-size:17px;font-weight:900;box-shadow:0 0 22px rgba(0,207,255,.27)}
.result{display:none;margin-top:15px;padding:16px;border-radius:23px;background:linear-gradient(160deg,rgba(0,234,255,.16),rgba(138,44,255,.22));border:1px solid rgba(255,255,255,.22)}
.big{text-align:center;font-size:28px;font-weight:900;color:#7df9ff;margin:7px 0 13px}
.row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid rgba(255,255,255,.13);padding:8px 0;font-size:14px}
.row:last-child{border-bottom:0}
.note{margin-top:12px;font-size:12px;line-height:1.45;color:#d8d8d8;text-align:center}
.analysis{margin-top:12px;background:rgba(0,0,0,.22);border-radius:16px;padding:12px;font-size:13px;line-height:1.5}
.badge{display:inline-block;background:rgba(255,255,255,.14);border-radius:999px;padding:6px 10px;font-size:12px;margin:4px}
</style>
</head>
<body>
<div class="app">
  <div class="logo">ENGİN<span>360</span></div>
  <div class="sub">Sınav Strateji Simülatörü<br>TYT/AYT için kişiye göre çözüm sırası ve süre planı önerir.</div>

  <div class="card">
    <h3>Öğrenci Profili</h3>
    <label>Sınav</label>
    <select id="sinav">
      <option value="tyt">TYT</option>
      <option value="ayt_say">AYT Sayısal</option>
      <option value="ayt_ea">AYT Eşit Ağırlık</option>
    </select>

    <label>Başlarken en güvendiğin alan</label>
    <select id="guclu">
      <option value="mat">Matematik</option>
      <option value="turkce">Türkçe / Edebiyat</option>
      <option value="fen">Fen</option>
      <option value="sosyal">Sosyal</option>
    </select>

    <label>En çok zorlandığın durum</label>
    <select id="problem">
      <option value="sure">Süre yetmiyor</option>
      <option value="panik">Panik yapıyorum</option>
      <option value="inat">Zor soruda takılıyorum</option>
      <option value="dikkat">Dikkat hatası yapıyorum</option>
    </select>
  </div>

  <div class="card">
    <h3>Net Hedefi</h3>
    <div class="grid">
      <div><label>Hedef TYT Net</label><input id="tytNet" type="number" placeholder="Örn: 85"></div>
      <div><label>Hedef AYT Net</label><input id="aytNet" type="number" placeholder="Örn: 55"></div>
    </div>
  </div>

  <button onclick="planla()">Strateji Oluştur</button>

  <div class="result" id="sonuc">
    <div style="text-align:center">Önerilen Strateji</div>
    <div class="big" id="stratejiAdi">-</div>
    <div class="row"><span>1. Bölüm</span><b id="b1">-</b></div>
    <div class="row"><span>2. Bölüm</span><b id="b2">-</b></div>
    <div class="row"><span>3. Bölüm</span><b id="b3">-</b></div>
    <div class="row"><span>Kontrol Turu</span><b id="kontrol">-</b></div>
    <div class="analysis" id="yorum"></div>
    <div class="note">Bu araç öğrencinin sınav anındaki karar yükünü azaltmak için hazırlanmıştır.</div>
  </div>
</div>
<script>
function n(id){return Number(document.getElementById(id).value)||0}
function planla(){
  const sinav=document.getElementById("sinav").value;
  const guclu=document.getElementById("guclu").value;
  const problem=document.getElementById("problem").value;
  const tyt=n("tytNet"), ayt=n("aytNet");

  let ad="", b1="", b2="", b3="", kontrol="", yorum="";

  if(sinav==="tyt"){
    if(problem==="panik"){
      ad="Güvenli Başlangıç Planı";
      b1="Türkçe 30-35 dk";
      b2="Sosyal + Fen 30-35 dk";
      b3="Matematik 70-75 dk";
      kontrol="Son 15 dk işaretleme ve boş kontrolü";
      yorum="Panik yaşayan öğrenci sınava en zorlandığı yerden başlamamalı. İlk amaç ritim yakalamak. Matematikte ilk turda takıldığın soruyu işaretleyip geç.";
    } else if(problem==="sure"){
      ad="İki Tur Stratejisi";
      b1="Türkçe 35 dk";
      b2="Matematik ilk tur 45 dk";
      b3="Fen + Sosyal 35 dk";
      kontrol="Matematik ikinci tur 20 dk";
      yorum="Süre problemi olan öğrenci tek soruya saplanmamalı. İlk turda çözülebilir sorular toplanır, zorlar ikinci tura bırakılır.";
    } else if(problem==="inat"){
      ad="Takılma Önleyici Plan";
      b1="Güçlü alan 30 dk";
      b2="Matematik 50 dk";
      b3="Diğer testler 55 dk";
      kontrol="İşaretli sorulara 20 dk";
      yorum="Kural net: 90 saniyede yol açılmıyorsa soru ikinci tura kalır. İnat net kazandırmaz, süre kaybettirir.";
    } else {
      ad="Dikkat Kontrollü Plan";
      b1="Türkçe 35 dk";
      b2="Matematik 60 dk";
      b3="Fen + Sosyal 40 dk";
      kontrol="Son 15 dk soru kökü ve kodlama kontrolü";
      yorum="Dikkat hatası yapan öğrenci son dakikayı yeni soru çözmeye değil, işaretleme ve soru kökü kontrolüne ayırmalı.";
    }
  }

  if(sinav==="ayt_say"){
    ad="AYT Sayısal Alan Planı";
    if(guclu==="mat"){
      b1="Matematik 65-70 dk";
      b2="Fen 55-60 dk";
      b3="Matematik ikinci tur 25 dk";
      kontrol="Son 10 dk boş/kodlama kontrolü";
      yorum="Matematik güçlüyse önce matematikten yüksek getirili sorular alınır. Fen ikinci blokta çözülür. Zor matematik soruları sona bırakılır.";
    } else {
      b1="Fen 55-60 dk";
      b2="Matematik ilk tur 60 dk";
      b3="Matematik ikinci tur 25 dk";
      kontrol="Son 10 dk kontrol";
      yorum="Fen daha güvenliyse sınava fenle başlamak ritim sağlar. Matematikte ilk tur kolay-orta sorular toplanmalı.";
    }
  }

  if(sinav==="ayt_ea"){
    ad="AYT EA Denge Planı";
    if(guclu==="mat"){
      b1="Matematik 65 dk";
      b2="Edebiyat-Sosyal 45 dk";
      b3="Matematik ikinci tur 25 dk";
      kontrol="Son 10 dk kontrol";
      yorum="EA'da üst sıraları matematik taşır. Matematik güçlüyse ilk blokta avantaj alınmalı.";
    } else {
      b1="Edebiyat-Sosyal 45-50 dk";
      b2="Matematik ilk tur 60 dk";
      b3="Matematik ikinci tur 25 dk";
      kontrol="Son 10 dk kontrol";
      yorum="Edebiyat-Sosyal güven veriyorsa önce netleri garantiye al, sonra matematikte iki turlu ilerle.";
    }
  }

  if(tyt>=95 || ayt>=65) yorum += " Hedefin yüksek olduğu için boş bırakma değil, doğru soru seçimi stratejisi daha önemli.";
  else yorum += " Şu aşamada amaç tüm soruları görmek ve kolay-orta soruları kaçırmamaktır.";

  document.getElementById("stratejiAdi").innerText=ad;
  document.getElementById("b1").innerText=b1;
  document.getElementById("b2").innerText=b2;
  document.getElementById("b3").innerText=b3;
  document.getElementById("kontrol").innerText=kontrol;
  document.getElementById("yorum").innerText=yorum;
  document.getElementById("sonuc").style.display="block";
}
</script>
</body>
</html>
